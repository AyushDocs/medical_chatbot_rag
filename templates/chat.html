<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .chat-container { width: 800px; max-width: 95vw; height: 90vh; background: white; border-radius: 16px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
    .header { background: #2563eb; color: white; padding: 20px 24px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
    .message.user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.bot { background: #f0f2f5; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.bot.loading { color: #666; font-style: italic; }
    .input-area { padding: 16px 24px; border-top: 1px solid #e5e7eb; display: flex; gap: 12px; }
    .input-area input { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
    .input-area input:focus { border-color: #2563eb; }
    .input-area button { padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .input-area button:hover { background: #1d4ed8; }
    .input-area button:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <h1>Medical Chatbot</h1>
      <p>Ask me anything from Current Medical Diagnosis & Treatment 2025</p>
    </div>
    <div class="messages" id="messages">
      <div class="message bot">Hi! I'm a medical chatbot. Ask me any question about diagnosis and treatment.</div>
    </div>
    <div class="input-area">
      <input type="text" id="questionInput" placeholder="e.g. What are the symptoms of diabetes?" />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');

    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;
      addMessage(question, 'user');
      input.value = '';
      sendBtn.disabled = true;
      const loadingEl = addMessage('Thinking...', 'bot loading');

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        loadingEl.remove();
        addMessage(data.answer || 'Sorry, I could not find an answer.', 'bot');
      } catch {
        loadingEl.remove();
        addMessage('An error occurred. Please try again.', 'bot');
      }
      sendBtn.disabled = false;
    }
  </script>
</body>
</html>
